services:
  db:
    image: postgres:16-alpine
    container_name: jhis_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Cholna@1234
      POSTGRES_DB: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./migrate.sql:/docker-entrypoint-initdb.d/02_migrate.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    container_name: jhis_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 3000
      DEV_AUTO_VERIFY: "true"
      FRONTEND_URL: http://localhost:8081
      BASE_URL: http://localhost:3000
      JWT_SECRET: change-this-to-a-long-random-secret-before-production
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: postgres
      DB_USER: postgres
      DB_PASSWORD: Cholna@1234
      DATABASE_URL: postgresql://postgres:Cholna@1234@db:5432/postgres
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: "587"
      SMTP_USER: your@gmail.com
      SMTP_PASS: your-app-password
      SMTP_FROM: "JihWorld <your@gmail.com>"
    ports:
      - "3000:3000"
    volumes:
      - uploads:/app/uploads

volumes:
  pgdata:
  uploads:
